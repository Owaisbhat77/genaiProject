model:
  vocab_size: 0  # set automatically from dataset
  block_size: 16
  n_layers: 1
  n_heads: 1
  n_embd: 32

train:
  batch_size: 4
  max_iters: 10
  lr: 0.0007
  eval_interval: 1
  eval_iters: 2
  device: "cpu"
  seed: 1337
  checkpoint_path: "checkpoints/model.pt"
  data_path: "data/tiny_shakespeare.txt"
